name: Release

# Manual only — you trigger it from the Actions tab and pick a tag.
# CI runs on every merge to main; releasing is a deliberate, separate step.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      # Builds the app, signs it with the Developer ID cert, notarizes + staples it
      # with Apple (so a downloaded build isn't blocked as "damaged"), bundles the
      # .dmg/.app, and creates a DRAFT GitHub Release so publishing stays manual.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — Developer ID Application cert (base64 .p12 + its password).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          # Notarization — Apple ID + an app-specific password + team id.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ github.event.inputs.tag }}
          releaseName: 'tt ${{ github.event.inputs.tag }}'
          releaseBody: |
            Download the `.dmg` below and drag **tt** to Applications.
          releaseDraft: true
